name: Live tests — Anthropic

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Override ANTHROPIC_LIVE_MODEL (default claude-sonnet-4-6)"
        required: false
        default: ""
      packages:
        description: "Go packages to test"
        required: false
        default: "./examples/features/..."
      run:
        description: "Optional -run regex"
        required: false
        default: ""

jobs:
  live-anthropic:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: go test
        env:
          GRATEFUL_LIVE_TESTS: required
          GRATEFUL_LIVE_PROVIDER: anthropic
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_LIVE_MODEL: ${{ inputs.model }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set"
            exit 1
          fi
          args=(-count=1 -v ${{ inputs.packages }})
          if [ -n "${{ inputs.run }}" ]; then
            args+=(-run "${{ inputs.run }}")
          else
            # Skip tests that hard-pin to a non-Anthropic provider.
            args+=(-skip 'TestOpenRouterLive|TestMultiProvider')
          fi
          go test "${args[@]}"
